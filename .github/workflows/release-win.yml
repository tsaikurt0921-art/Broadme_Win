name: Release Broadme Win

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./Broadme.Win/Broadme.Win.csproj

      - name: Publish (win-x64 self-contained)
        run: dotnet publish ./Broadme.Win/Broadme.Win.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o ./release/win-x64

      - name: Install Obfuscar
        run: dotnet tool install --global Obfuscar.GlobalTool

      - name: Obfuscate
        shell: pwsh
        run: |
          obfuscar.console ./obfuscar.xml

      - name: Zip release payload
        shell: pwsh
        run: |
          Compress-Archive -Path ./release/win-x64-obfuscated/* -DestinationPath ./Broadme.Win-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./Broadme.Win-win-x64.zip
          generate_release_notes: true
